services:
  db:
    image: postgres:15-alpine
    container_name: sgcm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/Santo_Domingo
      PGTZ: America/Santo_Domingo
    volumes:
      - sgcm_pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: sgcm_api
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: America/Santo_Domingo
      # SGCM_SEED: 'true' pobla la BD con datos del HTQPJB en cada arranque.
      # Default seguro (false) para producción — sobreescribir en .env para dev/demos.
      SGCM_SEED: ${SGCM_SEED:-false}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    # El entrypoint (docker-entrypoint.sh) decide si correr seed según SGCM_SEED
    # y luego ejecuta el CMD (uvicorn). Mantenemos el CMD por defecto del Dockerfile.

  nginx:
    image: nginx:1.27-alpine
    container_name: sgcm_nginx
    restart: unless-stopped
    environment:
      TZ: America/Santo_Domingo
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  sgcm_pgdata:
