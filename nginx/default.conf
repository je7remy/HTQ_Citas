server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # Headers de seguridad básicos
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Frontend estático
    root /usr/share/nginx/html/templates;
    index login.html;

    # Vendor (Tailwind, Lucide, FullCalendar, xlsx): inmutables, cache largo.
    # Sirven íntegramente desde el propio host — SGCM funciona sin internet.
    location /static/vendor/ {
        alias /usr/share/nginx/html/static/vendor/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Fuentes locales (Inter .woff2 + inter.css)
    location /static/fonts/ {
        alias /usr/share/nginx/html/static/fonts/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # CORS para que @font-face no falle si la página se sirve desde un host distinto
        add_header Access-Control-Allow-Origin "*";
    }

    # Resto de estáticos del proyecto (css/sgcm.css, js/app.js, etc.)
    location /static/ {
        alias /usr/share/nginx/html/static/;
        access_log off;
        expires 7d;
    }

    # Proxy a la API FastAPI
    location /api/ {
        proxy_pass         http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://api:8000/health;
    }

    location / {
        try_files $uri $uri/ /login.html;
    }
}
