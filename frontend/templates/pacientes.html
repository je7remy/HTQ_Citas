<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SGCM — Pacientes</title>
  <link rel="stylesheet" href="/static/fonts/inter/inter.css">
  <script src="/static/vendor/tailwind/tailwind.min.js"></script>
  <script src="/static/vendor/lucide/lucide.min.js"></script>
  <link rel="stylesheet" href="/static/css/sgcm.css" />
</head>
<body>
  <main id="page-main">
    <div class="page-header">
      <div>
        <h1 class="page-header__title">Gestión de Pacientes</h1>
        <p class="page-header__sub">Registro civil de pacientes del HTQPJB.</p>
      </div>
      <div class="page-header__actions" data-role="staff" style="display:none">
        <button id="btn-nuevo" class="btn btn-primary">
          <i data-lucide="user-plus"></i>
          <span>Nuevo paciente</span>
        </button>
      </div>
    </div>

    <!-- Formulario de alta / edición -->
    <section id="form-section" data-role="staff" style="display:none" class="card is-hidden" style="margin-bottom:18px;">
      <div class="card__header">
        <div>
          <div class="card__title" id="form-title">Nuevo paciente</div>
          <div class="card__sub">Complete los datos requeridos.</div>
        </div>
        <button type="button" id="form-collapse" class="icon-btn" aria-label="Cerrar formulario">
          <i data-lucide="x"></i>
        </button>
      </div>
      <form id="paciente-form" class="card__body grid-3">
        <input type="hidden" id="paciente-id" />
        <div class="field">
          <label class="field__label">Cédula *</label>
          <input id="cedula" required maxlength="13" placeholder="000-0000000-0" class="input mono" style="font-family:ui-monospace, monospace;" />
        </div>
        <div class="field">
          <label class="field__label">Nombre *</label>
          <input id="nombre" required class="input" />
        </div>
        <div class="field">
          <label class="field__label">Apellidos *</label>
          <input id="apellidos" required class="input" />
        </div>
        <div class="field">
          <label class="field__label">Teléfono *</label>
          <input id="telefono" required placeholder="(000) 000-0000" maxlength="14" class="input" />
        </div>
        <div class="field">
          <label class="field__label">Sexo *</label>
          <select id="sexo" required class="select">
            <option value="">Seleccione…</option>
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
            <option value="otro">Otro</option>
            <option value="prefiero no decir">Prefiero no decir</option>
          </select>
        </div>
        <div class="field">
          <label class="field__label">Fecha de nacimiento *</label>
          <input id="fecha_nacimiento" type="date" required class="input" />
        </div>
        <div class="field">
          <label class="field__label">Dirección</label>
          <input id="direccion" class="input" />
        </div>

        <div id="form-error" class="alert alert--danger is-hidden" style="grid-column:1/-1;">
          <i data-lucide="alert-circle"></i>
          <span></span>
        </div>

        <div class="row" style="grid-column:1/-1;">
          <button type="submit" class="btn btn-primary">
            <i data-lucide="check"></i>
            <span>Guardar</span>
          </button>
          <button type="button" id="cancel-btn" class="btn btn-ghost is-hidden">Cancelar</button>
        </div>
      </form>
    </section>

    <!-- Listado -->
    <section class="card">
      <div class="card__header">
        <div>
          <div class="card__title">Pacientes registrados</div>
          <div class="card__sub" id="total-info">—</div>
        </div>
        <div class="input-group" style="max-width:320px; min-width:240px;">
          <i data-lucide="search" class="input-group__icon"></i>
          <input id="search" placeholder="Buscar por cédula, nombre o apellido…" class="input" />
        </div>
      </div>

      <div id="lista-container" class="card__body" style="padding:0;">
        <div class="table-wrap" style="border:none; border-radius:0;">
          <table class="data-table">
            <thead>
              <tr>
                <th>Cédula</th>
                <th>Nombre</th>
                <th>Apellidos</th>
                <th>Sexo</th>
                <th>Fecha nac.</th>
                <th>Teléfono</th>
                <th data-role="staff" style="display:none" class="text-right">Acciones</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/js/app.js"></script>
  <script>
    /*
     * Pantalla "Pacientes". Listado paginable, búsqueda incremental,
     * CRUD de pacientes (alta/edición/baja).
     *
     * Acceso: todos los roles autenticados ven el listado (médico
     * necesita buscar pacientes para historial). Solo admin/secretaria
     * pueden CREAR/EDITAR/ELIMINAR — los botones llevan data-role="staff"
     * y se ocultan automáticamente.
     *
     * CÉDULA: al editar la deshabilitamos (cedula.disabled = true)
     * porque cambiarla es operativamente raro — el flujo correcto sería
     * crear un paciente nuevo. El backend acepta PATCH sin cedula.
     *
     * El telefono se desformatea antes de enviar al backend
     * (SGCM.stripDigits) para guardar solo los dígitos, manteniendo la
     * presentación con paréntesis y guiones solo en UI.
     */
    let currentUserRol = null;

    (async () => {
      const me = await SGCM.mountShell({ active: 'pacientes', pageTitle: 'Pacientes' });
      currentUserRol = me?.rol;
      SGCM.applyMaskCedula(document.getElementById("cedula"));
      SGCM.applyMaskTelefono(document.getElementById("telefono"));
      await cargar();
      lucide.createIcons();
    })();

    const formSection = document.getElementById("form-section");
    const form        = document.getElementById("paciente-form");
    const formTitle   = document.getElementById("form-title");
    const cancelBtn   = document.getElementById("cancel-btn");
    const errBox      = document.getElementById("form-error");

    document.getElementById("btn-nuevo").addEventListener("click", () => {
      resetForm();
      formSection.classList.remove("is-hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
    document.getElementById("form-collapse").addEventListener("click", () => {
      formSection.classList.add("is-hidden");
      resetForm();
    });

    function setAlert(msg) {
      errBox.querySelector("span").textContent = msg;
      errBox.classList.remove("is-hidden");
      lucide.createIcons();
    }

    function resetForm() {
      form.reset();
      document.getElementById("paciente-id").value = "";
      document.getElementById("cedula").disabled = false;
      formTitle.textContent = "Nuevo paciente";
      cancelBtn.classList.add("is-hidden");
      errBox.classList.add("is-hidden");
    }
    cancelBtn.addEventListener("click", () => { resetForm(); formSection.classList.add("is-hidden"); });

    async function cargar(q = "") {
      const path = q ? `/pacientes?q=${encodeURIComponent(q)}` : "/pacientes";
      const data = await SGCM.api(path);
      const tbody = document.getElementById("tbody");
      const totalInfo = document.getElementById("total-info");
      tbody.innerHTML = "";

      if (data.length === 0) {
        const isStaff = currentUserRol === "admin" || currentUserRol === "secretaria";
        const colspan = isStaff ? 7 : 6;
        tbody.innerHTML = `
          <tr><td colspan="${colspan}" style="padding:0;">
            <div class="empty-state">
              <div class="empty-state__icon"><i data-lucide="users-round"></i></div>
              <div class="empty-state__title">${q ? "Sin coincidencias" : "Sin pacientes registrados"}</div>
              <div class="empty-state__text">${q ? "Pruebe con otro término de búsqueda." : "Comience registrando el primer paciente."}</div>
              ${!q && isStaff ? `<button class="btn btn-primary" onclick="document.getElementById('btn-nuevo').click()"><i data-lucide="user-plus"></i><span>Nuevo paciente</span></button>` : ""}
            </div>
          </td></tr>`;
        totalInfo.textContent = q ? "0 resultados" : "Sin registros";
        lucide.createIcons();
        return;
      }
      totalInfo.textContent = `${data.length} paciente${data.length === 1 ? "" : "s"}`;
      const isStaff = currentUserRol === "admin" || currentUserRol === "secretaria";
      for (const p of data) {
        const tr = document.createElement("tr");
        const fechaNacFmt = p.fecha_nacimiento
          ? p.fecha_nacimiento.slice(8, 10) + "/" + p.fecha_nacimiento.slice(5, 7) + "/" + p.fecha_nacimiento.slice(0, 4)
          : "—";
        const sexoCap = p.sexo
          ? p.sexo.charAt(0).toUpperCase() + p.sexo.slice(1)
          : "—";
        tr.innerHTML = `
          <td class="mono">${SGCM.formatCedula(p.cedula)}</td>
          <td><strong>${p.nombre}</strong></td>
          <td>${p.apellidos}</td>
          <td>${sexoCap}</td>
          <td class="mono">${fechaNacFmt}</td>
          <td>${SGCM.formatTelefono(p.telefono) || "—"}</td>
          ${isStaff ? `<td class="text-right">
            <span class="row-actions">
              <button data-id="${p.id}" class="edit-btn icon-btn" title="Editar"><i data-lucide="pencil"></i></button>
              <button data-id="${p.id}" class="del-btn icon-btn icon-btn--danger" title="Eliminar"><i data-lucide="trash-2"></i></button>
            </span>
          </td>` : ""}
        `;
        tbody.appendChild(tr);
      }
      tbody.querySelectorAll(".edit-btn").forEach((b) => b.addEventListener("click", () => editar(b.dataset.id)));
      tbody.querySelectorAll(".del-btn").forEach((b) => b.addEventListener("click", () => eliminar(b.dataset.id)));
      lucide.createIcons();
    }

    async function editar(id) {
      const p = await SGCM.api(`/pacientes/${id}`);
      formSection.classList.remove("is-hidden");
      document.getElementById("paciente-id").value = p.id;
      document.getElementById("cedula").value = SGCM.formatCedula(p.cedula);
      document.getElementById("cedula").disabled = true;
      document.getElementById("nombre").value = p.nombre;
      document.getElementById("apellidos").value = p.apellidos;
      document.getElementById("telefono").value = SGCM.formatTelefono(p.telefono);
      document.getElementById("sexo").value = p.sexo || "";
      document.getElementById("fecha_nacimiento").value = p.fecha_nacimiento || "";
      document.getElementById("direccion").value = p.direccion || "";
      formTitle.textContent = `Editar paciente #${p.id}`;
      cancelBtn.classList.remove("is-hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function eliminar(id) {
      if (!confirm("¿Eliminar este paciente?")) return;
      try {
        await SGCM.api(`/pacientes/${id}`, { method: "DELETE" });
        await cargar(document.getElementById("search").value);
      } catch (e) { alert(e.message); }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errBox.classList.add("is-hidden");
      const id = document.getElementById("paciente-id").value;
      const payload = {
        cedula: document.getElementById("cedula").value,
        nombre: document.getElementById("nombre").value,
        apellidos: document.getElementById("apellidos").value,
        sexo: document.getElementById("sexo").value,
        telefono: SGCM.stripDigits(document.getElementById("telefono").value),
        fecha_nacimiento: document.getElementById("fecha_nacimiento").value || null,
        direccion: document.getElementById("direccion").value || null,
      };
      try {
        if (id) {
          const { cedula, ...rest } = payload;
          await SGCM.api(`/pacientes/${id}`, { method: "PATCH", body: JSON.stringify(rest) });
        } else {
          await SGCM.api("/pacientes", { method: "POST", body: JSON.stringify(payload) });
        }
        document.getElementById("cedula").disabled = false;
        resetForm();
        formSection.classList.add("is-hidden");
        await cargar();
      } catch (e) { setAlert(e.message); }
    });

    // Debounce de 250ms para la búsqueda en el listado.
    // Mismo patrón que en calendar.html — evita disparar /pacientes?q=
    // en cada keystroke.
    let searchTimer;
    document.getElementById("search").addEventListener("input", (e) => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => cargar(e.target.value), 250);
    });
  </script>
</body>
</html>
