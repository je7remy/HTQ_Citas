<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SGCM — Auditoría</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/static/css/sgcm.css" />
</head>
<body>
  <main id="page-main">
    <div class="page-header">
      <div>
        <h1 class="page-header__title">Auditoría del sistema</h1>
        <p class="page-header__sub">CU-15 · Registro inmutable de acciones realizadas en el SGCM.</p>
      </div>
    </div>

    <!-- Filtros -->
    <section class="card" style="margin-bottom:18px;">
      <div class="card__header">
        <div>
          <div class="card__title">Filtros</div>
          <div class="card__sub">Acote la búsqueda por acción, tabla o rango de fechas.</div>
        </div>
      </div>
      <form id="filter-form" class="card__body grid-4" style="align-items:end;">
        <div class="field">
          <label class="field__label">Acción</label>
          <select id="accion" class="select">
            <option value="">Todas</option>
            <option>CREATE</option>
            <option>UPDATE</option>
            <option>DELETE</option>
            <option>LOGIN</option>
          </select>
        </div>
        <div class="field">
          <label class="field__label">Tabla</label>
          <select id="tabla" class="select">
            <option value="">Todas</option>
            <option>usuarios</option>
            <option>pacientes</option>
            <option>medicos</option>
            <option>horarios</option>
            <option>citas</option>
            <option>consultas</option>
          </select>
        </div>
        <div class="field">
          <label class="field__label">Desde</label>
          <input type="date" id="desde" class="input" />
        </div>
        <div class="field">
          <label class="field__label">Hasta</label>
          <input type="date" id="hasta" class="input" />
        </div>
        <div class="row" style="grid-column:1/-1;">
          <button class="btn btn-primary">
            <i data-lucide="filter"></i>
            <span>Filtrar</span>
          </button>
          <button type="button" id="clear-btn" class="btn btn-ghost">
            <i data-lucide="x"></i>
            <span>Limpiar</span>
          </button>
        </div>
      </form>
    </section>

    <section class="card">
      <div class="card__header">
        <div>
          <div class="card__title">Registros</div>
          <div class="card__sub" id="total">—</div>
        </div>
      </div>

      <div id="error-box" class="alert alert--danger is-hidden" style="margin:14px 24px 0;">
        <i data-lucide="alert-circle"></i>
        <span></span>
      </div>

      <div class="card__body" style="padding:0;">
        <div class="table-wrap" style="border:none; border-radius:0;">
          <table class="data-table">
            <thead>
              <tr>
                <th>Fecha / Hora</th>
                <th>Usuario</th>
                <th>ID</th>
                <th>Acción</th>
                <th>Tabla</th>
                <th>Registro</th>
                <th>Detalle</th>
                <th>IP</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>

      <div class="card__body flex-spread" style="border-top:1px solid var(--color-border-soft);">
        <button id="prev-btn" class="btn btn-ghost btn-sm">
          <i data-lucide="chevron-left"></i>
          <span>Anterior</span>
        </button>
        <span id="page-info" class="text-muted" style="font-size:12.5px;"></span>
        <button id="next-btn" class="btn btn-ghost btn-sm">
          <span>Siguiente</span>
          <i data-lucide="chevron-right"></i>
        </button>
      </div>
    </section>
  </main>

  <script src="/static/js/app.js"></script>
  <script>
    const LIMIT = 25;
    let offset = 0;
    let total = 0;

    const COLOR_ACCION = {
      CREATE: "badge--green",
      UPDATE: "badge--blue",
      DELETE: "badge--red",
      LOGIN:  "badge--purple",
    };

    function setAlert(box, msg) {
      box.querySelector("span").textContent = msg;
      box.classList.remove("is-hidden");
      lucide.createIcons();
    }

    (async () => {
      const me = await SGCM.mountShell({ active: 'auditoria', pageTitle: 'Auditoría' });
      if (!me) return;
      if (me.rol !== "admin") {
        setAlert(document.getElementById("error-box"), "Esta pantalla es solo para administradores.");
        return;
      }
      await cargar();
      lucide.createIcons();
    })();

    function buildQuery() {
      const params = new URLSearchParams();
      const accion = document.getElementById("accion").value;
      const tabla = document.getElementById("tabla").value;
      const desde = document.getElementById("desde").value;
      const hasta = document.getElementById("hasta").value;
      if (accion) params.set("accion", accion);
      if (tabla) params.set("tabla", tabla);
      if (desde) params.set("desde", desde);
      if (hasta) params.set("hasta", hasta);
      params.set("limit", LIMIT);
      params.set("offset", offset);
      return params.toString();
    }

    async function cargar() {
      document.getElementById("error-box").classList.add("is-hidden");
      try {
        const data = await SGCM.api(`/auditoria?${buildQuery()}`);
        total = data.total;
        document.getElementById("total").textContent = `${total} registro${total === 1 ? "" : "s"}`;

        const tbody = document.getElementById("tbody");
        tbody.innerHTML = "";
        if (data.items.length === 0) {
          tbody.innerHTML = `<tr><td colspan="8" style="padding:0;">
            <div class="empty-state">
              <div class="empty-state__icon"><i data-lucide="file-search"></i></div>
              <div class="empty-state__title">Sin registros</div>
              <div class="empty-state__text">Ajuste los filtros o amplíe el rango de fechas.</div>
            </div>
          </td></tr>`;
        } else {
          for (const r of data.items) {
            const tr = document.createElement("tr");
            const fecha = SGCM.formatFechaHora(r.fecha_hora);
            const colorClass = COLOR_ACCION[r.accion] || "badge--gray";
            tr.innerHTML = `
              <td class="mono" style="white-space:nowrap;">${fecha}</td>
              <td><strong>${r.nombre_usuario ?? "—"}</strong></td>
              <td class="mono text-muted" style="font-size:11.5px;">${r.id_usuario ?? "—"}</td>
              <td><span class="badge ${colorClass}">${r.accion}</span></td>
              <td class="mono">${r.tabla_afectada}</td>
              <td class="mono">${r.id_registro ?? "—"}</td>
              <td class="text-muted" style="max-width:340px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${(r.detalle ?? "").replace(/"/g, '&quot;')}">${r.detalle ?? "—"}</td>
              <td class="mono text-muted">${r.ip_origen ?? "—"}</td>`;
            tbody.appendChild(tr);
          }
        }

        const pagina = Math.floor(offset / LIMIT) + 1;
        const totalPaginas = Math.max(1, Math.ceil(total / LIMIT));
        document.getElementById("page-info").textContent = `Página ${pagina} de ${totalPaginas}`;
        document.getElementById("prev-btn").disabled = offset === 0;
        document.getElementById("next-btn").disabled = offset + LIMIT >= total;
        lucide.createIcons();
      } catch (e) {
        setAlert(document.getElementById("error-box"), e.message);
      }
    }

    document.getElementById("filter-form").addEventListener("submit", (e) => {
      e.preventDefault();
      offset = 0;
      cargar();
    });

    document.getElementById("clear-btn").addEventListener("click", () => {
      document.getElementById("filter-form").reset();
      offset = 0;
      cargar();
    });

    document.getElementById("prev-btn").addEventListener("click", () => {
      if (offset >= LIMIT) { offset -= LIMIT; cargar(); }
    });

    document.getElementById("next-btn").addEventListener("click", () => {
      if (offset + LIMIT < total) { offset += LIMIT; cargar(); }
    });
  </script>
</body>
</html>
