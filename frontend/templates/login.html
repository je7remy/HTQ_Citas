<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SGCM — Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/static/css/sgcm.css" />
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-brand__mark">
          <i data-lucide="activity"></i>
        </div>
        <div style="text-align:center;">
          <div class="login-brand__name">SGCM</div>
          <div class="login-brand__sub">Hospital Regional Traumatológico y Quirúrgico Prof. Juan Bosch</div>
        </div>
      </div>

      <form id="login-form" class="stack" autocomplete="on">
        <div class="field">
          <label class="field__label" for="email">Correo electrónico</label>
          <div class="input-group">
            <i data-lucide="mail" class="input-group__icon"></i>
            <input id="email" type="email" required autocomplete="username"
              class="input" placeholder="usuario@htqpjb.gob.do" />
          </div>
        </div>

        <div class="field">
          <label class="field__label" for="password">Contraseña</label>
          <div class="input-group">
            <i data-lucide="lock" class="input-group__icon"></i>
            <input id="password" type="password" required autocomplete="current-password"
              class="input" placeholder="••••••••" />
          </div>
        </div>

        <div id="error" class="alert alert--danger is-hidden">
          <i data-lucide="alert-circle"></i>
          <span id="error-msg"></span>
        </div>

        <button type="submit" id="btn-login" class="btn btn-primary btn-lg" style="width:100%; margin-top:4px;">
          <span id="btn-login-label">Iniciar sesión</span>
        </button>
      </form>

      <div class="login-footer">© 2026 SGCM · La Vega, R.D.</div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script>
    lucide.createIcons();

    const form     = document.getElementById("login-form");
    const errBox   = document.getElementById("error");
    const errMsg   = document.getElementById("error-msg");
    const btn      = document.getElementById("btn-login");
    const btnLabel = document.getElementById("btn-login-label");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errBox.classList.add("is-hidden");
      btn.disabled = true;
      btnLabel.innerHTML = '<span class="spinner" style="vertical-align:-3px; margin-right:8px;"></span>Verificando…';
      try {
        await SGCM.login(
          document.getElementById("email").value,
          document.getElementById("password").value
        );
        let destino = "/calendar.html";
        try {
          const me = await SGCM.me();
          if (me && me.rol === "medico") destino = "/agenda.html";
        } catch (_) { /* si /auth/me falla, caemos al destino por defecto */ }
        window.location.href = destino;
      } catch (err) {
        errMsg.textContent = err.message;
        errBox.classList.remove("is-hidden");
        lucide.createIcons();
      } finally {
        btn.disabled = false;
        btnLabel.textContent = "Iniciar sesión";
      }
    });
  </script>
</body>
</html>
