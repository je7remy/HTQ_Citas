<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SGCM — Calendario de Citas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/locales/es.global.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen">
  <header class="bg-blue-800 text-white shadow">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold">SGCM — Calendario de Citas</h1>
        <p class="text-xs text-blue-200">HTQPJB · La Vega</p>
      </div>
      <nav class="flex items-center gap-3 text-sm">
        <a href="/calendar.html" class="font-semibold underline">Calendario</a>
        <a href="/pacientes.html" class="hover:underline">Pacientes</a>
        <a href="/medicos.html" class="hover:underline">Médicos</a>
        <span data-role="medico" style="display:none"><a href="/agenda.html" class="hover:underline">Mi Agenda</a></span>
        <span data-role="admin" style="display:none"><a href="/usuarios.html" class="hover:underline">Usuarios</a></span>
        <span data-role="admin" style="display:none"><a href="/auditoria.html" class="hover:underline">Auditoría</a></span>
        <span id="user-info" class="ml-3 text-blue-200"></span>
        <button id="logout" class="bg-blue-900 hover:bg-blue-950 px-3 py-1 rounded">Salir</button>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-6">
    <div class="bg-white rounded-2xl shadow p-4">
      <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
        <div class="flex gap-4 text-sm">
          <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-blue-600"></span>Pendiente</span>
          <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-green-600"></span>Atendida</span>
          <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-gray-400"></span>Cancelada</span>
        </div>
        <div class="flex gap-2">
          <button data-role="staff" style="display:none" id="btn-reporte"
            class="bg-slate-200 hover:bg-slate-300 text-slate-800 text-sm font-semibold px-4 py-2 rounded-lg">
            Reporte PDF
          </button>
          <button data-role="staff" style="display:none" id="btn-nueva-cita"
            class="bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold px-4 py-2 rounded-lg">
            + Nueva Cita
          </button>
        </div>
      </div>
      <div id="calendar"></div>
    </div>
  </main>

  <!-- ══════════════ MODAL: NUEVA CITA ══════════════ -->
  <div id="modal-nueva-cita" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
        <h2 class="text-lg font-semibold text-slate-800">Nueva Cita</h2>
        <button id="nc-cerrar" class="text-slate-400 hover:text-slate-600 text-xl font-bold">&times;</button>
      </div>
      <form id="form-nueva-cita" class="p-6 space-y-4">
        <!-- Búsqueda de paciente -->
        <div class="relative">
          <label class="block text-sm text-slate-600 mb-1">Paciente *</label>
          <input id="nc-busqueda" autocomplete="off" placeholder="Buscar por cédula o nombre…"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" />
          <input type="hidden" id="nc-paciente-id" />
          <div id="nc-resultados"
            class="absolute z-10 w-full bg-white border border-slate-200 rounded-lg shadow mt-1 divide-y divide-slate-100 max-h-48 overflow-y-auto"></div>
        </div>

        <!-- Médico -->
        <div>
          <label class="block text-sm text-slate-600 mb-1">Médico *</label>
          <select id="nc-medico" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
            <option value="">Seleccione un médico…</option>
          </select>
        </div>

        <!-- Fecha + Hora -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm text-slate-600 mb-1">Fecha *</label>
            <input type="date" id="nc-fecha" required
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" />
          </div>
          <div>
            <label class="block text-sm text-slate-600 mb-1">Hora *</label>
            <input type="time" id="nc-hora" required
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" />
          </div>
        </div>

        <!-- Motivo -->
        <div>
          <label class="block text-sm text-slate-600 mb-1">Motivo</label>
          <input id="nc-motivo" placeholder="Opcional"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" />
        </div>

        <div id="nc-error" class="hidden text-sm text-red-700 bg-red-50 border border-red-200 rounded p-2"></div>

        <div class="flex gap-2 pt-1">
          <button type="submit"
            class="flex-1 bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 rounded-lg">
            Guardar cita
          </button>
          <button type="button" id="nc-cancelar"
            class="bg-slate-200 hover:bg-slate-300 text-slate-800 px-4 py-2 rounded-lg">
            Cancelar
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ══════════════ MODAL: DETALLE / ACCIONES CITA ══════════════ -->
  <div id="modal-detalle-cita" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
        <h2 class="text-lg font-semibold text-slate-800">Detalle de cita</h2>
        <button id="det-cerrar" class="text-slate-400 hover:text-slate-600 text-xl font-bold">&times;</button>
      </div>
      <div class="p-6 space-y-3 text-sm">
        <p class="font-medium text-slate-800" id="det-titulo"></p>
        <div class="flex gap-4 text-slate-600">
          <span>Fecha: <strong id="det-fecha"></strong></span>
          <span>Hora: <strong id="det-hora"></strong></span>
        </div>
        <div>Estado: <span id="det-estado" class="px-2 py-0.5 rounded text-xs font-semibold"></span></div>
        <div class="text-slate-600">Motivo: <span id="det-motivo"></span></div>

        <div id="det-acciones" class="pt-2 space-y-3">
          <div class="flex gap-2">
            <button id="btn-cancelar-cita"
              class="flex-1 bg-red-600 hover:bg-red-700 text-white text-sm font-semibold py-2 rounded-lg">
              Cancelar cita
            </button>
            <button id="btn-reprogramar"
              class="flex-1 bg-amber-500 hover:bg-amber-600 text-white text-sm font-semibold py-2 rounded-lg">
              Reprogramar
            </button>
          </div>

          <!-- Subform reprogramar (toggle) -->
          <form id="form-reprogramar" class="hidden border border-slate-200 rounded-lg p-3 space-y-2 bg-slate-50">
            <p class="text-xs text-slate-500 font-semibold">Nueva fecha y hora</p>
            <div class="grid grid-cols-2 gap-2">
              <div>
                <label class="text-xs text-slate-600">Fecha</label>
                <input type="date" id="rep-fecha" required
                  class="w-full mt-1 rounded border border-slate-300 px-2 py-1 text-sm" />
              </div>
              <div>
                <label class="text-xs text-slate-600">Hora</label>
                <input type="time" id="rep-hora" required
                  class="w-full mt-1 rounded border border-slate-300 px-2 py-1 text-sm" />
              </div>
            </div>
            <button type="submit"
              class="w-full bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold py-1.5 rounded-lg">
              Confirmar reprogramación
            </button>
          </form>
        </div>

        <div id="det-error" class="hidden text-sm text-red-700 bg-red-50 border border-red-200 rounded p-2"></div>
      </div>
    </div>
  </div>

  <!-- ══════════════ MODAL: REPORTE PDF ══════════════ -->
  <div id="modal-reporte" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
        <h2 class="text-lg font-semibold text-slate-800">Reporte PDF de Citas</h2>
        <button id="rep-cerrar" class="text-slate-400 hover:text-slate-600 text-xl font-bold">&times;</button>
      </div>
      <div class="p-6 space-y-4">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm text-slate-600 mb-1">Desde *</label>
            <input type="date" id="rep-desde" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" />
          </div>
          <div>
            <label class="block text-sm text-slate-600 mb-1">Hasta *</label>
            <input type="date" id="rep-hasta" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" />
          </div>
        </div>
        <div>
          <label class="block text-sm text-slate-600 mb-1">Médico (opcional)</label>
          <select id="rep-medico-sel" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
            <option value="">Todos los médicos</option>
          </select>
        </div>
        <div id="rep-error" class="hidden text-sm text-red-700 bg-red-50 border border-red-200 rounded p-2"></div>
        <button id="btn-descargar-reporte"
          class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 rounded-lg text-sm">
          Descargar PDF
        </button>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script>
    SGCM.requireAuth();

    let currentUserRol = null;
    let medicosList = [];
    let currentCitaId = null;
    let calendar;

    (async () => {
      const me = await SGCM.me();
      document.getElementById("user-info").textContent = `${me.nombre} (${me.rol})`;
      currentUserRol = me.rol;
      SGCM.applyNavPermissions(me.rol);
      medicosList = await SGCM.api("/medicos");
      poblarSelectores();
      initCalendar();
    })();

    document.getElementById("logout").addEventListener("click", () => {
      SGCM.logout();
      window.location.href = "/login.html";
    });

    // ── Selectores de médico ──
    function poblarSelectores() {
      const selCita = document.getElementById("nc-medico");
      const selReporte = document.getElementById("rep-medico-sel");
      medicosList.forEach((m) => {
        const opt = `<option value="${m.id}">${SGCM.formatMedicoNombre(m.nombre)} — ${m.especialidad}</option>`;
        selCita.insertAdjacentHTML("beforeend", opt);
        selReporte.insertAdjacentHTML("beforeend", `<option value="${m.id}">${SGCM.formatMedicoNombre(m.nombre)}</option>`);
      });
    }

    // ── Calendario ──
    function initCalendar() {
      const calendarEl = document.getElementById("calendar");
      calendar = new FullCalendar.Calendar(calendarEl, {
        locale: "es",
        initialView: "dayGridMonth",
        headerToolbar: {
          left: "prev,next today",
          center: "title",
          right: "dayGridMonth,timeGridWeek,timeGridDay",
        },
        slotMinTime: "07:00:00",
        slotMaxTime: "19:00:00",
        allDaySlot: false,
        height: "auto",
        events: async (info, success, failure) => {
          try {
            const data = await SGCM.api(
              `/citas/calendar?start=${info.startStr.slice(0, 10)}&end=${info.endStr.slice(0, 10)}`
            );
            success(data);
          } catch (e) {
            failure(e);
          }
        },
        dateClick: (info) => {
          if (currentUserRol !== "admin" && currentUserRol !== "secretaria") return;
          document.getElementById("nc-fecha").value = info.dateStr;
          abrirModalNuevaCita();
        },
        eventClick: (info) => {
          abrirModalDetalle(info.event);
        },
      });
      calendar.render();
    }

    // ══════════════ MODAL NUEVA CITA ══════════════
    document.getElementById("btn-nueva-cita").addEventListener("click", abrirModalNuevaCita);
    document.getElementById("nc-cerrar").addEventListener("click", cerrarModalNuevaCita);
    document.getElementById("nc-cancelar").addEventListener("click", cerrarModalNuevaCita);

    function abrirModalNuevaCita() {
      document.getElementById("nc-error").classList.add("hidden");
      document.getElementById("nc-busqueda").value = "";
      document.getElementById("nc-resultados").innerHTML = "";
      document.getElementById("nc-paciente-id").value = "";
      document.getElementById("nc-hora").value = "";
      document.getElementById("nc-motivo").value = "";
      document.getElementById("modal-nueva-cita").classList.remove("hidden");
    }

    function cerrarModalNuevaCita() {
      document.getElementById("modal-nueva-cita").classList.add("hidden");
    }

    // Autocomplete paciente
    let busquedaTimer;
    document.getElementById("nc-busqueda").addEventListener("input", (e) => {
      document.getElementById("nc-paciente-id").value = "";
      clearTimeout(busquedaTimer);
      const q = e.target.value.trim();
      const div = document.getElementById("nc-resultados");
      if (q.length < 2) { div.innerHTML = ""; return; }
      busquedaTimer = setTimeout(async () => {
        try {
          const data = await SGCM.api(`/pacientes?q=${encodeURIComponent(q)}`);
          div.innerHTML = "";
          if (data.length === 0) {
            div.innerHTML = `<div class="px-3 py-2 text-sm text-slate-400">Sin resultados</div>`;
            return;
          }
          data.slice(0, 6).forEach((p) => {
            const item = document.createElement("div");
            item.className = "px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm";
            item.textContent = `${SGCM.formatCedula(p.cedula)} — ${p.nombre} ${p.apellidos}`;
            item.addEventListener("click", () => {
              document.getElementById("nc-paciente-id").value = p.id;
              document.getElementById("nc-busqueda").value = `${SGCM.formatCedula(p.cedula)} — ${p.nombre} ${p.apellidos}`;
              div.innerHTML = "";
            });
            div.appendChild(item);
          });
        } catch (_) {}
      }, 250);
    });

    document.getElementById("form-nueva-cita").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errBox = document.getElementById("nc-error");
      errBox.classList.add("hidden");
      const pacienteId = document.getElementById("nc-paciente-id").value;
      if (!pacienteId) {
        errBox.textContent = "Seleccione un paciente de la lista de resultados.";
        errBox.classList.remove("hidden");
        return;
      }
      try {
        await SGCM.api("/citas", {
          method: "POST",
          body: JSON.stringify({
            id_paciente: parseInt(pacienteId),
            id_medico: parseInt(document.getElementById("nc-medico").value),
            fecha: document.getElementById("nc-fecha").value,
            hora: document.getElementById("nc-hora").value + ":00",
            motivo: document.getElementById("nc-motivo").value || null,
          }),
        });
        cerrarModalNuevaCita();
        calendar.refetchEvents();
      } catch (err) {
        errBox.textContent = err.message;
        errBox.classList.remove("hidden");
      }
    });

    // ══════════════ MODAL DETALLE CITA ══════════════
    document.getElementById("det-cerrar").addEventListener("click", cerrarModalDetalle);

    function abrirModalDetalle(event) {
      currentCitaId = parseInt(event.id);
      const p = event.extendedProps;
      const isStaff = currentUserRol === "admin" || currentUserRol === "secretaria";
      const isPendiente = p.estado === "pendiente";

      document.getElementById("det-titulo").textContent = event.title;

      const startStr = event.startStr; // "2026-05-07T09:00:00"
      const fecha = startStr.slice(0, 10);
      const hora = startStr.slice(11, 16);
      document.getElementById("det-fecha").textContent = new Date(fecha + "T12:00:00").toLocaleDateString("es-DO");
      document.getElementById("det-hora").textContent = hora;

      const estadoEl = document.getElementById("det-estado");
      estadoEl.textContent = p.estado;
      estadoEl.className = "px-2 py-0.5 rounded text-xs font-semibold " + (
        p.estado === "pendiente" ? "bg-blue-100 text-blue-800" :
        p.estado === "atendida"  ? "bg-green-100 text-green-800" :
                                   "bg-gray-100 text-gray-600"
      );

      document.getElementById("det-motivo").textContent = p.motivo || "—";
      document.getElementById("rep-fecha").value = fecha;
      document.getElementById("rep-hora").value = hora;
      document.getElementById("form-reprogramar").classList.add("hidden");
      document.getElementById("det-error").classList.add("hidden");
      document.getElementById("det-acciones").style.display = (isStaff && isPendiente) ? "" : "none";

      document.getElementById("modal-detalle-cita").classList.remove("hidden");
    }

    function cerrarModalDetalle() {
      document.getElementById("modal-detalle-cita").classList.add("hidden");
      currentCitaId = null;
    }

    document.getElementById("btn-cancelar-cita").addEventListener("click", async () => {
      if (!confirm("¿Cancelar esta cita? El historial se conserva.")) return;
      const errBox = document.getElementById("det-error");
      errBox.classList.add("hidden");
      try {
        await SGCM.api(`/citas/${currentCitaId}`, { method: "DELETE" });
        cerrarModalDetalle();
        calendar.refetchEvents();
      } catch (err) {
        errBox.textContent = err.message;
        errBox.classList.remove("hidden");
      }
    });

    document.getElementById("btn-reprogramar").addEventListener("click", () => {
      document.getElementById("form-reprogramar").classList.toggle("hidden");
    });

    document.getElementById("form-reprogramar").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errBox = document.getElementById("det-error");
      errBox.classList.add("hidden");
      try {
        await SGCM.api(`/citas/${currentCitaId}`, {
          method: "PATCH",
          body: JSON.stringify({
            fecha: document.getElementById("rep-fecha").value,
            hora: document.getElementById("rep-hora").value + ":00",
          }),
        });
        cerrarModalDetalle();
        calendar.refetchEvents();
      } catch (err) {
        errBox.textContent = err.message;
        errBox.classList.remove("hidden");
      }
    });

    // ══════════════ MODAL REPORTE PDF ══════════════
    document.getElementById("btn-reporte").addEventListener("click", () => {
      const hoy = new Date();
      const y = hoy.getFullYear(), m = hoy.getMonth();
      document.getElementById("rep-desde").value =
        new Date(y, m, 1).toISOString().slice(0, 10);
      document.getElementById("rep-hasta").value =
        new Date(y, m + 1, 0).toISOString().slice(0, 10);
      document.getElementById("rep-error").classList.add("hidden");
      document.getElementById("modal-reporte").classList.remove("hidden");
    });

    document.getElementById("rep-cerrar").addEventListener("click", () => {
      document.getElementById("modal-reporte").classList.add("hidden");
    });

    document.getElementById("btn-descargar-reporte").addEventListener("click", async () => {
      const desde = document.getElementById("rep-desde").value;
      const hasta = document.getElementById("rep-hasta").value;
      const medicoId = document.getElementById("rep-medico-sel").value;
      const errBox = document.getElementById("rep-error");
      errBox.classList.add("hidden");

      if (!desde || !hasta) {
        errBox.textContent = "Seleccione un rango de fechas.";
        errBox.classList.remove("hidden");
        return;
      }
      try {
        let url = `/api/v1/reportes/citas.pdf?desde=${desde}&hasta=${hasta}`;
        if (medicoId) url += `&id_medico=${medicoId}`;

        const res = await fetch(url, {
          headers: { Authorization: `Bearer ${SGCM.getToken()}` },
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }
        const blob = await res.blob();
        const objUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = objUrl;
        a.download = `reporte_citas_${desde}_${hasta}.pdf`;
        a.click();
        URL.revokeObjectURL(objUrl);
        document.getElementById("modal-reporte").classList.add("hidden");
      } catch (err) {
        errBox.textContent = err.message;
        errBox.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
