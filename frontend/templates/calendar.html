<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SGCM — Calendario de Citas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/locales/es.global.min.js"></script>
  <link rel="stylesheet" href="/static/css/sgcm.css" />
</head>
<body>
  <main id="page-main">
    <div class="page-header">
      <div>
        <h1 class="page-header__title">Calendario de Citas</h1>
        <p class="page-header__sub">Vista mensual, semanal y diaria del agendamiento del hospital.</p>
      </div>
      <div class="page-header__actions">
        <button data-role="staff" style="display:none" id="btn-reporte" class="btn btn-ghost">
          <i data-lucide="file-down"></i>
          <span>Reporte PDF</span>
        </button>
        <button data-role="staff" style="display:none" id="btn-nueva-cita" class="btn btn-primary">
          <i data-lucide="plus"></i>
          <span>Nueva cita</span>
        </button>
      </div>
    </div>

    <section class="card">
      <div class="card__header">
        <div class="row" style="align-items:center;">
          <span class="badge badge--blue"><span class="badge-dot badge-dot--blue"></span> Pendiente</span>
          <span class="badge badge--green"><span class="badge-dot badge-dot--green"></span> Atendida</span>
          <span class="badge badge--gray"><span class="badge-dot badge-dot--gray"></span> Cancelada</span>
        </div>
      </div>
      <div class="card__body">
        <div id="calendar"></div>
      </div>
    </section>
  </main>

  <!-- ══════════════ MODAL: NUEVA CITA ══════════════ -->
  <div id="modal-nueva-cita" class="modal-backdrop is-hidden">
    <div class="modal modal--lg">
      <div class="modal__header">
        <h2 class="modal__title">Nueva cita</h2>
        <button class="modal__close" id="nc-cerrar" aria-label="Cerrar"><i data-lucide="x"></i></button>
      </div>
      <form id="form-nueva-cita" class="modal__body stack">
        <div class="field" style="position:relative;">
          <label class="field__label">Paciente *</label>
          <div class="input-group">
            <i data-lucide="search" class="input-group__icon"></i>
            <input id="nc-busqueda" autocomplete="off" placeholder="Buscar por cédula o nombre…" class="input" />
          </div>
          <input type="hidden" id="nc-paciente-id" />
          <div id="nc-resultados" class="card" style="position:absolute; top:100%; left:0; right:0; margin-top:4px; max-height:200px; overflow-y:auto; z-index:10;"></div>
        </div>

        <div class="field">
          <label class="field__label">Médico *</label>
          <select id="nc-medico" required class="select">
            <option value="">Seleccione un médico…</option>
          </select>
        </div>

        <div class="grid-2">
          <div class="field">
            <label class="field__label">Fecha *</label>
            <input type="date" id="nc-fecha" required class="input" />
          </div>
          <div class="field">
            <label class="field__label">Hora *</label>
            <input type="time" id="nc-hora" required class="input" />
          </div>
        </div>
        <div id="nc-sugerencia" class="text-soft" style="font-size:12.5px; margin-top:-6px;"></div>

        <div class="field">
          <label class="field__label">Motivo</label>
          <input id="nc-motivo" placeholder="Opcional" class="input" />
        </div>

        <div id="nc-historial-aviso" class="alert alert--info is-hidden">
          <i data-lucide="history"></i>
          <span id="nc-historial-texto"></span>
          <button type="button" id="nc-ver-historial" class="btn btn-ghost btn-sm" style="margin-left:auto;">Ver historial</button>
        </div>

        <div id="nc-error" class="alert alert--danger is-hidden">
          <i data-lucide="alert-circle"></i>
          <span></span>
        </div>
      </form>
      <div class="modal__footer">
        <button type="button" id="nc-cancelar" class="btn btn-ghost">Cancelar</button>
        <button type="submit" form="form-nueva-cita" class="btn btn-primary">
          <i data-lucide="check"></i>
          <span>Guardar cita</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════ MODAL: DETALLE CITA ══════════════ -->
  <div id="modal-detalle-cita" class="modal-backdrop is-hidden">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title">Detalle de cita</h2>
        <button class="modal__close" id="det-cerrar" aria-label="Cerrar"><i data-lucide="x"></i></button>
      </div>
      <div class="modal__body stack">
        <div>
          <div style="font-size:16px; font-weight:600; color:var(--color-text); margin-bottom:8px;" id="det-titulo"></div>
          <div class="row row--sm">
            <span class="badge badge--gray"><i data-lucide="calendar" style="width:12px;height:12px;"></i><span id="det-fecha"></span></span>
            <span class="badge badge--gray"><i data-lucide="clock" style="width:12px;height:12px;"></i><span id="det-hora"></span></span>
            <span id="det-estado" class="badge badge--blue"></span>
          </div>
        </div>
        <div>
          <div class="field__label" style="margin-bottom:4px;">Motivo</div>
          <div id="det-motivo" class="text-muted" style="font-size:13.5px;">—</div>
        </div>

        <div id="det-acciones" class="stack">
          <div class="row">
            <button id="btn-cancelar-cita" class="btn btn-danger" style="flex:1;">
              <i data-lucide="x-circle"></i>
              <span>Cancelar cita</span>
            </button>
            <button id="btn-reprogramar" class="btn btn-warning" style="flex:1;">
              <i data-lucide="calendar-clock"></i>
              <span>Reprogramar</span>
            </button>
          </div>

          <form id="form-reprogramar" class="is-hidden card card--padded" style="background:#FAFBFC;">
            <div class="field__label" style="margin-bottom:8px;">Nueva fecha y hora</div>
            <div class="grid-2" style="margin-bottom:10px;">
              <div class="field">
                <label class="field__label">Fecha</label>
                <input type="date" id="rep-fecha" required class="input" />
              </div>
              <div class="field">
                <label class="field__label">Hora</label>
                <input type="time" id="rep-hora" required class="input" />
              </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">
              <i data-lucide="check"></i>
              <span>Confirmar reprogramación</span>
            </button>
          </form>
        </div>

        <div id="det-error" class="alert alert--danger is-hidden">
          <i data-lucide="alert-circle"></i>
          <span></span>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════ MODAL: HISTORIAL MÉDICO ══════════════ -->
  <div id="modal-historial" class="modal-backdrop is-hidden">
    <div class="modal modal--lg">
      <div class="modal__header">
        <h2 class="modal__title">Historial médico de <span id="hm-paciente-nombre">paciente</span></h2>
        <button type="button" class="modal__close" id="hm-cerrar"><i data-lucide="x"></i></button>
      </div>
      <div id="hm-body" class="modal__body stack"></div>
    </div>
  </div>

  <!-- ══════════════ MODAL: REPORTE PDF ══════════════ -->
  <div id="modal-reporte" class="modal-backdrop is-hidden">
    <div class="modal modal--sm">
      <div class="modal__header">
        <h2 class="modal__title">Reporte PDF de citas</h2>
        <button class="modal__close" id="rep-cerrar" aria-label="Cerrar"><i data-lucide="x"></i></button>
      </div>
      <div class="modal__body stack">
        <div class="grid-2">
          <div class="field">
            <label class="field__label">Desde *</label>
            <input type="date" id="rep-desde" class="input" />
          </div>
          <div class="field">
            <label class="field__label">Hasta *</label>
            <input type="date" id="rep-hasta" class="input" />
          </div>
        </div>
        <div class="field">
          <label class="field__label">Médico (opcional)</label>
          <select id="rep-medico-sel" class="select">
            <option value="">Todos los médicos</option>
          </select>
        </div>
        <div id="rep-error" class="alert alert--danger is-hidden">
          <i data-lucide="alert-circle"></i>
          <span></span>
        </div>
      </div>
      <div class="modal__footer">
        <button id="btn-descargar-reporte" class="btn btn-primary" style="width:100%;">
          <i data-lucide="download"></i>
          <span>Descargar PDF</span>
        </button>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script>
    let currentUserRol = null;
    let medicosList = [];
    let currentCitaId = null;
    let calendar;

    function setAlert(box, msg) {
      box.querySelector("span").textContent = msg;
      box.classList.remove("is-hidden");
      lucide.createIcons();
    }

    (async () => {
      const me = await SGCM.mountShell({ active: 'calendario', pageTitle: 'Calendario de Citas' });
      currentUserRol = me?.rol;
      medicosList = await SGCM.api("/medicos");
      poblarSelectores();
      initCalendar();
      lucide.createIcons();
    })();

    function poblarSelectores() {
      const selCita = document.getElementById("nc-medico");
      const selReporte = document.getElementById("rep-medico-sel");
      medicosList.forEach((m) => {
        const opt = `<option value="${m.id}">${SGCM.formatMedicoNombre(m.nombre)} — ${m.especialidad}</option>`;
        selCita.insertAdjacentHTML("beforeend", opt);
        selReporte.insertAdjacentHTML("beforeend", `<option value="${m.id}">${SGCM.formatMedicoNombre(m.nombre)}</option>`);
      });
    }

    function initCalendar() {
      const calendarEl = document.getElementById("calendar");
      calendar = new FullCalendar.Calendar(calendarEl, {
        locale: "es",
        initialView: "dayGridMonth",
        headerToolbar: { left: "prev,next today", center: "title", right: "dayGridMonth,timeGridWeek,timeGridDay" },
        slotMinTime: "07:00:00",
        slotMaxTime: "19:00:00",
        slotLabelFormat: {
          hour: "numeric",
          minute: "2-digit",
          meridiem: "short",
          hour12: true,
        },
        eventTimeFormat: {
          hour: "numeric",
          minute: "2-digit",
          meridiem: "short",
          hour12: true,
        },
        allDaySlot: false,
        height: "auto",
        events: async (info, success, failure) => {
          try {
            const data = await SGCM.api(`/citas/calendar?start=${info.startStr.slice(0,10)}&end=${info.endStr.slice(0,10)}`);
            success(data);
          } catch (e) { failure(e); }
        },
        dateClick: (info) => {
          if (currentUserRol !== "admin" && currentUserRol !== "secretaria") return;
          document.getElementById("nc-fecha").value = info.dateStr;
          abrirModalNuevaCita();
        },
        eventClick: (info) => abrirModalDetalle(info.event),
      });
      calendar.render();
    }

    // ═══ Nueva cita
    document.getElementById("btn-nueva-cita").addEventListener("click", abrirModalNuevaCita);
    document.getElementById("nc-cerrar").addEventListener("click", cerrarModalNuevaCita);
    document.getElementById("nc-cancelar").addEventListener("click", cerrarModalNuevaCita);

    function abrirModalNuevaCita() {
      document.getElementById("nc-error").classList.add("is-hidden");
      document.getElementById("nc-busqueda").value = "";
      document.getElementById("nc-resultados").innerHTML = "";
      document.getElementById("nc-paciente-id").value = "";
      document.getElementById("nc-hora").value = "";
      document.getElementById("nc-motivo").value = "";
      document.getElementById("nc-medico").value = "";
      document.getElementById("nc-sugerencia").textContent = "";
      document.getElementById("nc-historial-aviso").classList.add("is-hidden");
      document.getElementById("modal-nueva-cita").classList.remove("is-hidden");
    }

    async function actualizarAvisoHistorial() {
      const aviso = document.getElementById("nc-historial-aviso");
      const texto = document.getElementById("nc-historial-texto");
      const pacienteId = document.getElementById("nc-paciente-id").value;
      const medicoId = document.getElementById("nc-medico").value;
      aviso.classList.add("is-hidden");
      if (!pacienteId || !medicoId) return;
      try {
        const historial = await SGCM.api(`/pacientes/${pacienteId}/historial-medico?medico_id=${medicoId}`);
        if (historial.length > 0) {
          texto.textContent = `Este paciente tiene ${historial.length} consulta${historial.length === 1 ? "" : "s"} previa${historial.length === 1 ? "" : "s"} con este médico.`;
          aviso.classList.remove("is-hidden");
          lucide.createIcons();
        }
      } catch (_) { /* silencioso */ }
    }

    document.getElementById("nc-medico").addEventListener("change", async (e) => {
      const sugBox = document.getElementById("nc-sugerencia");
      sugBox.textContent = "";
      const id = e.target.value;
      if (!id) return;
      try {
        const sug = await SGCM.api(`/medicos/${id}/proxima-disponibilidad`);
        if (sug) {
          document.getElementById("nc-fecha").value = sug.fecha;
          document.getElementById("nc-hora").value = sug.hora.slice(0, 5);
          sugBox.textContent = `Sugerencia: ${sug.fecha_legible}, ${sug.hora_legible}. Puede modificarla si lo desea.`;
        } else {
          sugBox.style.color = "var(--color-warning, #b45309)";
          sugBox.textContent = "No hay disponibilidad en los próximos 30 días para este médico. Edite manualmente.";
        }
      } catch (_) { /* silencio: no bloquear el modal */ }
      actualizarAvisoHistorial();
    });

    document.getElementById("nc-ver-historial").addEventListener("click", () => {
      const pacienteId = document.getElementById("nc-paciente-id").value;
      const medicoId = document.getElementById("nc-medico").value;
      if (pacienteId && medicoId) abrirHistorial(parseInt(pacienteId), parseInt(medicoId));
    });

    document.getElementById("hm-cerrar").addEventListener("click", () => {
      document.getElementById("modal-historial").classList.add("is-hidden");
    });

    async function abrirHistorial(pacienteId, medicoId = null) {
      const body = document.getElementById("hm-body");
      const nombreEl = document.getElementById("hm-paciente-nombre");
      body.innerHTML = `<div class="text-soft">Cargando…</div>`;
      nombreEl.textContent = `paciente #${pacienteId}`;
      document.getElementById("modal-historial").classList.remove("is-hidden");
      try {
        const [paciente, historial] = await Promise.all([
          SGCM.api(`/pacientes/${pacienteId}`),
          SGCM.api(`/pacientes/${pacienteId}/historial-medico` + (medicoId ? `?medico_id=${medicoId}` : "")),
        ]);
        nombreEl.textContent = `${paciente.nombre} ${paciente.apellidos}`;
        if (historial.length === 0) {
          body.innerHTML = `
            <div class="empty-state">
              <div class="empty-state__icon"><i data-lucide="file-x"></i></div>
              <div class="empty-state__title">Sin consultas previas</div>
              <div class="empty-state__text">No hay consultas registradas para este paciente.</div>
            </div>`;
        } else {
          body.innerHTML = historial.map((h, i) => {
            const fechaCorta = h.fecha_consulta.slice(8, 10) + "/" + h.fecha_consulta.slice(5, 7) + "/" + h.fecha_consulta.slice(0, 4);
            const sec = (label, val) => val ? `<div style="margin-top:6px;"><strong>${label}:</strong> <span class="text-muted">${val}</span></div>` : "";
            return `
              <details class="card" style="padding:12px 14px;" ${i === 0 ? "open" : ""}>
                <summary style="cursor:pointer; font-weight:600;">
                  ${fechaCorta} · ${h.hora_consulta} · ${SGCM.formatMedicoNombre(h.medico)} (${h.especialidad})
                  <div class="text-muted" style="font-weight:400; font-size:13px;">${h.condicion_principal || "—"}</div>
                </summary>
                <div style="margin-top:10px; font-size:13.5px;">
                  ${sec("Motivo", h.motivo_consulta)}
                  ${sec("Examen físico", h.examen_fisico)}
                  ${sec("Condición principal", h.condicion_principal)}
                  ${sec("Condiciones secundarias", h.condiciones_secundarias)}
                  ${sec("Tratamiento", h.tratamiento)}
                </div>
              </details>`;
          }).join("");
        }
        lucide.createIcons();
      } catch (e) {
        body.innerHTML = `<div class="alert alert--danger"><i data-lucide="alert-circle"></i><span>${e.message}</span></div>`;
        lucide.createIcons();
      }
    }
    function cerrarModalNuevaCita() {
      document.getElementById("modal-nueva-cita").classList.add("is-hidden");
    }

    let busquedaTimer;
    document.getElementById("nc-busqueda").addEventListener("input", (e) => {
      document.getElementById("nc-paciente-id").value = "";
      clearTimeout(busquedaTimer);
      const q = e.target.value.trim();
      const div = document.getElementById("nc-resultados");
      if (q.length < 2) { div.innerHTML = ""; return; }
      busquedaTimer = setTimeout(async () => {
        try {
          const data = await SGCM.api(`/pacientes?q=${encodeURIComponent(q)}`);
          div.innerHTML = "";
          if (data.length === 0) {
            div.innerHTML = `<div class="text-soft" style="padding:10px 14px; font-size:13px;">Sin resultados</div>`;
            return;
          }
          data.slice(0, 6).forEach((p) => {
            const item = document.createElement("div");
            item.style.cssText = "padding:9px 14px; font-size:13.5px; cursor:pointer; border-bottom:1px solid var(--color-border-soft);";
            item.textContent = `${SGCM.formatCedula(p.cedula)} — ${p.nombre} ${p.apellidos}`;
            item.addEventListener("mouseover", () => item.style.background = "var(--color-primary-light)");
            item.addEventListener("mouseout", () => item.style.background = "");
            item.addEventListener("click", () => {
              document.getElementById("nc-paciente-id").value = p.id;
              document.getElementById("nc-busqueda").value = `${SGCM.formatCedula(p.cedula)} — ${p.nombre} ${p.apellidos}`;
              div.innerHTML = "";
              actualizarAvisoHistorial();
            });
            div.appendChild(item);
          });
        } catch (_) {}
      }, 250);
    });

    document.getElementById("form-nueva-cita").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errBox = document.getElementById("nc-error");
      errBox.classList.add("is-hidden");
      const pacienteId = document.getElementById("nc-paciente-id").value;
      if (!pacienteId) { setAlert(errBox, "Seleccione un paciente de la lista de resultados."); return; }
      try {
        await SGCM.api("/citas", {
          method: "POST",
          body: JSON.stringify({
            id_paciente: parseInt(pacienteId),
            id_medico: parseInt(document.getElementById("nc-medico").value),
            fecha: document.getElementById("nc-fecha").value,
            hora: document.getElementById("nc-hora").value + ":00",
            motivo: document.getElementById("nc-motivo").value || null,
          }),
        });
        cerrarModalNuevaCita();
        calendar.refetchEvents();
      } catch (err) { setAlert(errBox, err.message); }
    });

    // ═══ Detalle cita
    document.getElementById("det-cerrar").addEventListener("click", cerrarModalDetalle);

    function abrirModalDetalle(event) {
      currentCitaId = parseInt(event.id);
      const p = event.extendedProps;
      const isStaff = currentUserRol === "admin" || currentUserRol === "secretaria";
      const isPendiente = p.estado === "pendiente";

      document.getElementById("det-titulo").textContent = event.title;
      const startStr = event.startStr;
      const fecha = startStr.slice(0, 10);
      const hora = startStr.slice(11, 16);
      document.getElementById("det-fecha").textContent = new Date(fecha + "T12:00:00").toLocaleDateString("es-DO");
      document.getElementById("det-hora").textContent = SGCM.formatHora12(hora);

      const estadoEl = document.getElementById("det-estado");
      estadoEl.textContent = p.estado;
      estadoEl.className = "badge " + (
        p.estado === "pendiente" ? "badge--blue" :
        p.estado === "atendida"  ? "badge--green" :
                                   "badge--gray"
      );

      document.getElementById("det-motivo").textContent = p.motivo || "—";
      document.getElementById("rep-fecha").value = fecha;
      document.getElementById("rep-hora").value = hora;
      document.getElementById("form-reprogramar").classList.add("is-hidden");
      document.getElementById("det-error").classList.add("is-hidden");
      document.getElementById("det-acciones").style.display = (isStaff && isPendiente) ? "" : "none";

      document.getElementById("modal-detalle-cita").classList.remove("is-hidden");
      lucide.createIcons();
    }

    function cerrarModalDetalle() {
      document.getElementById("modal-detalle-cita").classList.add("is-hidden");
      currentCitaId = null;
    }

    document.getElementById("btn-cancelar-cita").addEventListener("click", async () => {
      if (!confirm("¿Cancelar esta cita? El historial se conserva.")) return;
      const errBox = document.getElementById("det-error");
      errBox.classList.add("is-hidden");
      try {
        await SGCM.api(`/citas/${currentCitaId}`, { method: "DELETE" });
        cerrarModalDetalle();
        calendar.refetchEvents();
      } catch (err) { setAlert(errBox, err.message); }
    });

    document.getElementById("btn-reprogramar").addEventListener("click", () => {
      document.getElementById("form-reprogramar").classList.toggle("is-hidden");
    });

    document.getElementById("form-reprogramar").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errBox = document.getElementById("det-error");
      errBox.classList.add("is-hidden");
      try {
        await SGCM.api(`/citas/${currentCitaId}`, {
          method: "PATCH",
          body: JSON.stringify({
            fecha: document.getElementById("rep-fecha").value,
            hora: document.getElementById("rep-hora").value + ":00",
          }),
        });
        cerrarModalDetalle();
        calendar.refetchEvents();
      } catch (err) { setAlert(errBox, err.message); }
    });

    // ═══ Reporte PDF
    document.getElementById("btn-reporte").addEventListener("click", () => {
      const hoy = new Date();
      const y = hoy.getFullYear(), m = hoy.getMonth();
      document.getElementById("rep-desde").value = new Date(y, m, 1).toISOString().slice(0, 10);
      document.getElementById("rep-hasta").value = new Date(y, m + 1, 0).toISOString().slice(0, 10);
      document.getElementById("rep-error").classList.add("is-hidden");
      document.getElementById("modal-reporte").classList.remove("is-hidden");
    });

    document.getElementById("rep-cerrar").addEventListener("click", () => {
      document.getElementById("modal-reporte").classList.add("is-hidden");
    });

    document.getElementById("btn-descargar-reporte").addEventListener("click", async () => {
      const desde = document.getElementById("rep-desde").value;
      const hasta = document.getElementById("rep-hasta").value;
      const medicoId = document.getElementById("rep-medico-sel").value;
      const errBox = document.getElementById("rep-error");
      errBox.classList.add("is-hidden");

      if (!desde || !hasta) { setAlert(errBox, "Seleccione un rango de fechas."); return; }
      try {
        let url = `/api/v1/reportes/citas.pdf?desde=${desde}&hasta=${hasta}`;
        if (medicoId) url += `&id_medico=${medicoId}`;
        const res = await fetch(url, { headers: { Authorization: `Bearer ${SGCM.getToken()}` } });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }
        const blob = await res.blob();
        const objUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = objUrl;
        a.download = `reporte_citas_${desde}_${hasta}.pdf`;
        a.click();
        URL.revokeObjectURL(objUrl);
        document.getElementById("modal-reporte").classList.add("is-hidden");
      } catch (err) { setAlert(errBox, err.message); }
    });
  </script>
</body>
</html>
