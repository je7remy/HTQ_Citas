<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SGCM — Usuarios</title>
  <link rel="stylesheet" href="/static/fonts/inter/inter.css">
  <script src="/static/vendor/tailwind/tailwind.min.js"></script>
  <script src="/static/vendor/lucide/lucide.min.js"></script>
  <link rel="stylesheet" href="/static/css/sgcm.css" />
</head>
<body>
  <main id="page-main">
    <div class="page-header">
      <div>
        <h1 class="page-header__title">Gestión de Usuarios</h1>
        <p class="page-header__sub">CU-02 · Cuentas, roles y estados de los usuarios del sistema.</p>
      </div>
      <div class="page-header__actions">
        <button id="btn-nuevo-usuario" class="btn btn-primary">
          <i data-lucide="user-plus"></i>
          <span>Nuevo usuario</span>
        </button>
      </div>
    </div>

    <!-- Listado -->
    <section class="card">
      <div class="card__header">
        <div>
          <div class="card__title">Usuarios registrados</div>
          <div class="card__sub" id="usuarios-total">—</div>
        </div>
      </div>

      <div id="lista-error" class="alert alert--danger is-hidden" style="margin:14px 24px 0;">
        <i data-lucide="alert-circle"></i>
        <span></span>
      </div>

      <div class="card__body" style="padding:0;">
        <div class="table-wrap" style="border:none; border-radius:0;">
          <table class="data-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Estado</th>
                <th class="text-right">Acciones</th>
              </tr>
            </thead>
            <tbody id="tbody-usuarios"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <!-- ══════════════ MODAL: NUEVO USUARIO ══════════════ -->
  <div id="modal-nuevo-usuario" class="modal-backdrop is-hidden">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title">Nuevo usuario</h2>
        <button type="button" class="modal__close" id="nu-cerrar"><i data-lucide="x"></i></button>
      </div>
      <form id="form-usuario" class="modal__body stack">
        <div class="field">
          <label class="field__label">Nombre *</label>
          <input id="u-nombre" required class="input" />
        </div>
        <div class="field">
          <label class="field__label">Email *</label>
          <input id="u-email" type="email" required class="input" placeholder="usuario@htqpjb.gob.do" />
        </div>
        <div class="grid-2">
          <div class="field">
            <label class="field__label">Contraseña *</label>
            <input id="u-password" type="password" required minlength="8" placeholder="Mín. 8 caracteres" class="input" />
          </div>
          <div class="field">
            <label class="field__label">Rol *</label>
            <select id="u-rol" required class="select">
              <option value="secretaria">Secretaria</option>
              <option value="medico">Médico</option>
              <option value="admin">Administrador</option>
            </select>
          </div>
        </div>
        <div id="u-error" class="alert alert--danger is-hidden">
          <i data-lucide="alert-circle"></i>
          <span></span>
        </div>
      </form>
      <div class="modal__footer">
        <button type="button" id="nu-cancelar" class="btn btn-ghost">Cancelar</button>
        <button type="submit" form="form-usuario" class="btn btn-primary">
          <i data-lucide="check"></i>
          <span>Crear usuario</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════ MODAL: EDITAR USUARIO ══════════════ -->
  <div id="modal-editar-usuario" class="modal-backdrop is-hidden">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title">Editar usuario</h2>
        <button type="button" class="modal__close" id="eu-cerrar"><i data-lucide="x"></i></button>
      </div>
      <form id="form-editar-usuario" class="modal__body stack">
        <input type="hidden" id="eu-id" />
        <div class="field">
          <label class="field__label">Nombre</label>
          <input id="eu-nombre" class="input" />
        </div>
        <div class="field">
          <label class="field__label">Rol</label>
          <select id="eu-rol" class="select">
            <option value="secretaria">Secretaria</option>
            <option value="medico">Médico</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
        <label class="row row--sm" style="align-items:center; cursor:pointer;">
          <input type="checkbox" id="eu-activo" />
          <span style="font-size:14px;">Usuario activo</span>
        </label>
        <div id="eu-error" class="alert alert--danger is-hidden">
          <i data-lucide="alert-circle"></i>
          <span></span>
        </div>
      </form>
      <div class="modal__footer">
        <button type="button" id="eu-cancelar" class="btn btn-ghost">Cancelar</button>
        <button type="submit" form="form-editar-usuario" class="btn btn-primary">
          <i data-lucide="check"></i>
          <span>Guardar</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════ MODAL: CAMBIAR CONTRASEÑA ══════════════ -->
  <div id="modal-password" class="modal-backdrop is-hidden">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title">Cambiar contraseña</h2>
        <button type="button" class="modal__close" id="pw-cerrar"><i data-lucide="x"></i></button>
      </div>
      <form id="form-password" class="modal__body stack">
        <input type="hidden" id="pw-id" />
        <p class="text-muted" style="font-size:14px; margin:0;">
          Usuario: <strong id="pw-usuario-info">—</strong>
        </p>
        <div class="field">
          <label class="field__label">Nueva contraseña *</label>
          <input id="pw-nueva" type="password" required minlength="8" maxlength="128" class="input" />
        </div>
        <div class="field">
          <label class="field__label">Confirmar contraseña *</label>
          <input id="pw-confirmar" type="password" required minlength="8" maxlength="128" class="input" />
        </div>
        <p class="text-muted" style="font-size:12px; margin:0;">
          Requisitos: mínimo 8 caracteres, máximo 128.
        </p>
        <div id="pw-error" class="alert alert--danger is-hidden">
          <i data-lucide="alert-circle"></i>
          <span></span>
        </div>
      </form>
      <div class="modal__footer">
        <button type="button" id="pw-cancelar" class="btn btn-ghost">Cancelar</button>
        <button type="submit" form="form-password" class="btn btn-primary">
          <i data-lucide="check"></i>
          <span>Guardar contraseña</span>
        </button>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script>
    function setAlert(box, msg) {
      box.querySelector("span").textContent = msg;
      box.classList.remove("is-hidden");
      lucide.createIcons();
    }

    (async () => {
      const me = await SGCM.mountShell({ active: 'usuarios', pageTitle: 'Usuarios' });
      if (!me) return;
      if (me.rol !== "admin") {
        setAlert(document.getElementById("lista-error"), "Esta pantalla es solo para administradores.");
        return;
      }
      await cargarUsuarios();
      lucide.createIcons();
    })();

    const ROL_BADGE = {
      admin:      "badge--purple",
      secretaria: "badge--blue",
      medico:     "badge--green",
    };

    async function cargarUsuarios() {
      try {
        const data = await SGCM.api("/usuarios");
        const tbody = document.getElementById("tbody-usuarios");
        const totalInfo = document.getElementById("usuarios-total");
        tbody.innerHTML = "";
        if (data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6" style="padding:0;">
            <div class="empty-state">
              <div class="empty-state__icon"><i data-lucide="user-x"></i></div>
              <div class="empty-state__title">Sin usuarios registrados</div>
              <div class="empty-state__text">Cree el primer usuario del sistema.</div>
            </div>
          </td></tr>`;
          totalInfo.textContent = "Sin registros";
          lucide.createIcons();
          return;
        }
        totalInfo.textContent = `${data.length} usuario${data.length === 1 ? "" : "s"}`;
        for (const u of data) {
          const tr = document.createElement("tr");
          const badgeRol = ROL_BADGE[u.rol] || "badge--gray";
          tr.innerHTML = `
            <td class="text-muted mono">#${u.id}</td>
            <td><strong>${u.nombre}</strong></td>
            <td class="text-muted">${u.email}</td>
            <td><span class="badge ${badgeRol}">${u.rol}</span></td>
            <td>
              ${u.activo
                ? `<span class="badge badge--green"><i data-lucide="check" style="width:11px;height:11px;"></i> Activo</span>`
                : `<span class="badge badge--gray">Inactivo</span>`}
            </td>
            <td class="text-right">
              <button data-id="${u.id}" data-nombre="${u.nombre}" data-rol="${u.rol}" data-activo="${u.activo}"
                class="edit-u-btn icon-btn" title="Editar"><i data-lucide="pencil"></i></button>
              <button data-id="${u.id}" data-nombre="${u.nombre}" data-email="${u.email}"
                class="pw-u-btn icon-btn" title="Cambiar contraseña"><i data-lucide="key-round"></i></button>
            </td>`;
          tbody.appendChild(tr);
        }
        tbody.querySelectorAll(".edit-u-btn").forEach((b) =>
          b.addEventListener("click", () => abrirModalEditarUsuario(b.dataset))
        );
        tbody.querySelectorAll(".pw-u-btn").forEach((b) =>
          b.addEventListener("click", () => abrirModalPassword(b.dataset))
        );
        lucide.createIcons();
      } catch (err) {
        setAlert(document.getElementById("lista-error"), err.message);
      }
    }

    // ═══ Modal nuevo
    const modalNuevo = document.getElementById("modal-nuevo-usuario");
    document.getElementById("btn-nuevo-usuario").addEventListener("click", () => {
      document.getElementById("form-usuario").reset();
      document.getElementById("u-error").classList.add("is-hidden");
      modalNuevo.classList.remove("is-hidden");
    });
    document.getElementById("nu-cerrar").addEventListener("click", () => modalNuevo.classList.add("is-hidden"));
    document.getElementById("nu-cancelar").addEventListener("click", () => modalNuevo.classList.add("is-hidden"));

    document.getElementById("form-usuario").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errBox = document.getElementById("u-error");
      errBox.classList.add("is-hidden");
      try {
        await SGCM.api("/usuarios", {
          method: "POST",
          body: JSON.stringify({
            nombre: document.getElementById("u-nombre").value,
            email: document.getElementById("u-email").value,
            password: document.getElementById("u-password").value,
            rol: document.getElementById("u-rol").value,
          }),
        });
        modalNuevo.classList.add("is-hidden");
        await cargarUsuarios();
      } catch (err) { setAlert(errBox, err.message); }
    });

    // ═══ Modal editar
    const modalEditar = document.getElementById("modal-editar-usuario");
    document.getElementById("eu-cerrar").addEventListener("click", () => modalEditar.classList.add("is-hidden"));
    document.getElementById("eu-cancelar").addEventListener("click", () => modalEditar.classList.add("is-hidden"));

    function abrirModalEditarUsuario(data) {
      document.getElementById("eu-id").value = data.id;
      document.getElementById("eu-nombre").value = data.nombre;
      document.getElementById("eu-rol").value = data.rol;
      document.getElementById("eu-activo").checked = data.activo === "true";
      document.getElementById("eu-error").classList.add("is-hidden");
      modalEditar.classList.remove("is-hidden");
    }

    document.getElementById("form-editar-usuario").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errBox = document.getElementById("eu-error");
      errBox.classList.add("is-hidden");
      const id = document.getElementById("eu-id").value;
      try {
        await SGCM.api(`/usuarios/${id}`, {
          method: "PATCH",
          body: JSON.stringify({
            nombre: document.getElementById("eu-nombre").value,
            rol: document.getElementById("eu-rol").value,
            activo: document.getElementById("eu-activo").checked,
          }),
        });
        modalEditar.classList.add("is-hidden");
        await cargarUsuarios();
      } catch (err) { setAlert(errBox, err.message); }
    });

    // ═══ Modal cambiar contraseña
    const modalPw = document.getElementById("modal-password");
    document.getElementById("pw-cerrar").addEventListener("click", () => modalPw.classList.add("is-hidden"));
    document.getElementById("pw-cancelar").addEventListener("click", () => modalPw.classList.add("is-hidden"));

    function abrirModalPassword(data) {
      document.getElementById("pw-id").value = data.id;
      document.getElementById("pw-usuario-info").textContent = `${data.nombre} (${data.email})`;
      document.getElementById("form-password").reset();
      document.getElementById("pw-error").classList.add("is-hidden");
      modalPw.classList.remove("is-hidden");
    }

    document.getElementById("form-password").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errBox = document.getElementById("pw-error");
      errBox.classList.add("is-hidden");
      const id = document.getElementById("pw-id").value;
      const nueva = document.getElementById("pw-nueva").value;
      const confirmar = document.getElementById("pw-confirmar").value;

      if (nueva.length < 8) {
        return setAlert(errBox, "La contraseña debe tener al menos 8 caracteres.");
      }
      if (nueva.length > 128) {
        return setAlert(errBox, "La contraseña no puede pasar de 128 caracteres.");
      }
      if (nueva !== confirmar) {
        return setAlert(errBox, "Las contraseñas no coinciden.");
      }

      try {
        await SGCM.api(`/usuarios/${id}/password`, {
          method: "PATCH",
          body: JSON.stringify({ nueva_password: nueva }),
        });
        modalPw.classList.add("is-hidden");
        alert("Contraseña actualizada correctamente.");
      } catch (err) { setAlert(errBox, err.message); }
    });
  </script>
</body>
</html>
