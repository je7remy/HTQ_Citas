<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SGCM — Mi Agenda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/static/css/sgcm.css" />
</head>
<body>
  <main id="page-main">
    <div class="page-header">
      <div>
        <h1 id="titulo-agenda" class="page-header__title">Mi Agenda</h1>
        <p class="page-header__sub" id="subtitulo-agenda">CU-12 / CU-13 · Atención de citas y registro de consultas.</p>
      </div>
      <div class="page-header__actions">
        <div class="input-group" style="min-width:200px;">
          <i data-lucide="calendar" class="input-group__icon"></i>
          <input type="date" id="fecha-agenda" class="input" />
        </div>
        <button id="btn-hoy" class="btn btn-ghost">
          <i data-lucide="calendar-check"></i>
          <span>Hoy</span>
        </button>
      </div>
    </div>

    <div id="agenda-error" class="alert alert--danger is-hidden" style="margin-bottom:14px;">
      <i data-lucide="alert-circle"></i>
      <span></span>
    </div>

    <div id="agenda-lista" class="stack"></div>
  </main>

  <!-- ══════════════ MODAL: REGISTRAR CONSULTA ══════════════ -->
  <div id="modal-consulta" class="modal-backdrop is-hidden">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title">Registrar consulta</h2>
        <button type="button" class="modal__close" id="rc-cerrar"><i data-lucide="x"></i></button>
      </div>
      <form id="form-consulta" class="modal__body stack">
        <input type="hidden" id="rc-cita-id" />
        <div class="alert alert--info">
          <i data-lucide="info"></i>
          <span><strong>Cita:</strong> <span id="rc-cita-info"></span></span>
        </div>
        <div class="field">
          <label class="field__label">Observaciones *</label>
          <textarea id="rc-observaciones" required rows="5"
            placeholder="Diagnóstico, tratamiento indicado, notas…"
            class="textarea"></textarea>
        </div>
        <div id="rc-error" class="alert alert--danger is-hidden">
          <i data-lucide="alert-circle"></i>
          <span></span>
        </div>
      </form>
      <div class="modal__footer">
        <button type="button" id="rc-cancelar" class="btn btn-ghost">Cancelar</button>
        <button type="submit" form="form-consulta" class="btn btn-success">
          <i data-lucide="check-circle"></i>
          <span>Marcar como atendida</span>
        </button>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script>
    function setAlert(box, msg) {
      box.querySelector("span").textContent = msg;
      box.classList.remove("is-hidden");
      lucide.createIcons();
    }

    function fechaLarga(dateStr) {
      const d = new Date(dateStr + "T12:00:00");
      const txt = d.toLocaleDateString("es-DO", {
        weekday: "long", year: "numeric", month: "long", day: "numeric"
      });
      return txt.charAt(0).toUpperCase() + txt.slice(1);
    }

    (async () => {
      const me = await SGCM.mountShell({ active: 'agenda', pageTitle: 'Mi Agenda' });
      if (!me) return;
      if (me.rol !== "medico" && me.rol !== "admin") {
        setAlert(document.getElementById("agenda-error"), "Esta pantalla es solo para médicos.");
        return;
      }
      const hoy = new Date().toISOString().slice(0, 10);
      document.getElementById("fecha-agenda").value = hoy;
      await cargarAgenda(hoy);
      lucide.createIcons();
    })();

    document.getElementById("fecha-agenda").addEventListener("change", (e) => cargarAgenda(e.target.value));
    document.getElementById("btn-hoy").addEventListener("click", () => {
      const hoy = new Date().toISOString().slice(0, 10);
      document.getElementById("fecha-agenda").value = hoy;
      cargarAgenda(hoy);
    });

    async function cargarAgenda(fecha) {
      document.getElementById("agenda-error").classList.add("is-hidden");
      document.getElementById("titulo-agenda").textContent = fechaLarga(fecha);
      document.getElementById("subtitulo-agenda").textContent = "Citas asignadas para el día seleccionado.";

      try {
        const data = await SGCM.api(`/consultas/agenda?fecha=${fecha}`);
        const lista = document.getElementById("agenda-lista");
        lista.innerHTML = "";

        if (data.length === 0) {
          lista.innerHTML = `
            <div class="card">
              <div class="empty-state">
                <div class="empty-state__icon"><i data-lucide="calendar-x"></i></div>
                <div class="empty-state__title">Sin citas para este día</div>
                <div class="empty-state__text">No tiene pacientes asignados para la fecha seleccionada.</div>
              </div>
            </div>`;
          lucide.createIcons();
          return;
        }

        const ahora = new Date();

        for (const cita of data) {
          const card = document.createElement("div");
          card.className = "appt-card";

          const estadoBadge = cita.estado === "pendiente" ? "badge--blue"
                            : cita.estado === "atendida"  ? "badge--green"
                            : "badge--gray";

          const fechaHoraCita = new Date(cita.fecha + "T" + cita.hora);
          const puedeAtender = cita.estado === "pendiente" && ahora >= fechaHoraCita;
          const hora12 = SGCM.formatHora12(cita.hora);
          const [horaNum, ampm] = hora12.split(" ");
          const fechaCorta = fechaHoraCita.toLocaleDateString("es-DO", { day: "2-digit", month: "2-digit", year: "numeric" });

          let accionHTML;
          if (cita.estado === "pendiente") {
            if (puedeAtender) {
              accionHTML = `
                <button data-id="${cita.id}" data-info="Paciente #${cita.id_paciente} · ${hora12}"
                  class="atender-btn btn btn-success btn-sm">
                  <i data-lucide="stethoscope"></i>
                  <span>Registrar consulta</span>
                </button>`;
            } else {
              accionHTML = `
                <button disabled class="btn btn-ghost btn-sm" style="cursor:not-allowed;">
                  <i data-lucide="lock"></i>
                  <span>Registrar consulta</span>
                </button>
                <span class="text-soft" style="font-size:11.5px;">Disponible desde ${fechaCorta} ${hora12}</span>`;
            }
          } else {
            accionHTML = `<span class="badge badge--gray"><i data-lucide="check" style="width:12px;height:12px;"></i> Finalizada</span>`;
          }

          card.innerHTML = `
            <div class="appt-card__time">
              <div class="appt-card__time-h">${horaNum}</div>
              <div class="appt-card__time-ampm">${ampm}</div>
            </div>
            <div class="appt-card__body">
              <div class="row" style="align-items:center; gap:8px;">
                <span class="appt-card__patient">Paciente #${cita.id_paciente}</span>
                <span class="badge ${estadoBadge}">${cita.estado}</span>
              </div>
              ${cita.motivo ? `<div class="appt-card__motivo"><i data-lucide="message-square" style="display:inline-block; width:13px; height:13px; vertical-align:-2px; margin-right:4px;"></i>${cita.motivo}</div>` : ""}
            </div>
            <div class="appt-card__actions">${accionHTML}</div>
          `;
          lista.appendChild(card);
        }

        lista.querySelectorAll(".atender-btn").forEach((b) =>
          b.addEventListener("click", () => abrirModalConsulta(b.dataset.id, b.dataset.info))
        );
        lucide.createIcons();
      } catch (err) {
        setAlert(document.getElementById("agenda-error"), err.message);
      }
    }

    document.getElementById("rc-cerrar").addEventListener("click", cerrarModalConsulta);
    document.getElementById("rc-cancelar").addEventListener("click", cerrarModalConsulta);

    function abrirModalConsulta(citaId, citaInfo) {
      document.getElementById("rc-cita-id").value = citaId;
      document.getElementById("rc-cita-info").textContent = citaInfo;
      document.getElementById("rc-observaciones").value = "";
      document.getElementById("rc-error").classList.add("is-hidden");
      document.getElementById("modal-consulta").classList.remove("is-hidden");
      lucide.createIcons();
    }

    function cerrarModalConsulta() {
      document.getElementById("modal-consulta").classList.add("is-hidden");
    }

    document.getElementById("form-consulta").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errBox = document.getElementById("rc-error");
      errBox.classList.add("is-hidden");
      try {
        await SGCM.api("/consultas", {
          method: "POST",
          body: JSON.stringify({
            id_cita: parseInt(document.getElementById("rc-cita-id").value),
            observaciones: document.getElementById("rc-observaciones").value,
          }),
        });
        cerrarModalConsulta();
        await cargarAgenda(document.getElementById("fecha-agenda").value);
      } catch (err) { setAlert(errBox, err.message); }
    });
  </script>
</body>
</html>
