<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SGCM — Mi Agenda</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">
  <header class="bg-blue-800 text-white shadow">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold">SGCM — Mi Agenda</h1>
        <p class="text-xs text-blue-200">CU-12 / CU-13 · Módulo médico</p>
      </div>
      <nav class="flex items-center gap-3 text-sm">
        <a href="/calendar.html" class="hover:underline">Calendario</a>
        <a href="/pacientes.html" class="hover:underline">Pacientes</a>
        <a href="/medicos.html" class="hover:underline">Médicos</a>
        <span data-role="medico" style="display:none"><a href="/agenda.html" class="font-semibold underline">Mi Agenda</a></span>
        <span id="user-info" class="ml-3 text-blue-200"></span>
        <button id="logout" class="bg-blue-900 hover:bg-blue-950 px-3 py-1 rounded">Salir</button>
      </nav>
    </div>
  </header>

  <main class="max-w-4xl mx-auto p-6 space-y-6">
    <!-- Selector de fecha -->
    <section class="bg-white rounded-2xl shadow p-5">
      <div class="flex flex-wrap items-center gap-4">
        <div>
          <label class="block text-sm text-slate-600 mb-1">Fecha de agenda</label>
          <input type="date" id="fecha-agenda"
            class="rounded-lg border border-slate-300 px-3 py-2 text-sm" />
        </div>
        <button id="btn-hoy"
          class="mt-5 bg-slate-200 hover:bg-slate-300 text-slate-800 text-sm px-3 py-2 rounded-lg">
          Hoy
        </button>
      </div>
    </section>

    <!-- Lista de citas del día -->
    <section class="bg-white rounded-2xl shadow p-5">
      <h2 id="titulo-agenda" class="text-lg font-semibold text-slate-800 mb-4">Citas del día</h2>
      <div id="agenda-error" class="hidden mb-3 text-sm text-red-700 bg-red-50 border border-red-200 rounded p-2"></div>
      <div id="agenda-lista" class="space-y-3"></div>
    </section>
  </main>

  <!-- ══════════════ MODAL: REGISTRAR CONSULTA ══════════════ -->
  <div id="modal-consulta" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
        <h2 class="text-lg font-semibold text-slate-800">Registrar consulta</h2>
        <button id="rc-cerrar" class="text-slate-400 hover:text-slate-600 text-xl font-bold">&times;</button>
      </div>
      <form id="form-consulta" class="p-6 space-y-4">
        <input type="hidden" id="rc-cita-id" />
        <p class="text-sm text-slate-600">Cita: <strong id="rc-cita-info"></strong></p>
        <div>
          <label class="block text-sm text-slate-600 mb-1">Observaciones *</label>
          <textarea id="rc-observaciones" required rows="4"
            placeholder="Diagnóstico, tratamiento indicado, notas…"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm resize-none"></textarea>
        </div>
        <div id="rc-error" class="hidden text-sm text-red-700 bg-red-50 border border-red-200 rounded p-2"></div>
        <div class="flex gap-2">
          <button type="submit"
            class="flex-1 bg-green-700 hover:bg-green-800 text-white font-semibold py-2 rounded-lg">
            Marcar como atendida
          </button>
          <button type="button" id="rc-cancelar"
            class="bg-slate-200 hover:bg-slate-300 text-slate-800 px-4 py-2 rounded-lg">
            Cancelar
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script>
    SGCM.requireAuth();

    const DIAS = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];

    (async () => {
      const me = await SGCM.me();
      document.getElementById("user-info").textContent = `${me.nombre} (${me.rol})`;
      SGCM.applyNavPermissions(me.rol);
      if (me.rol !== "medico" && me.rol !== "admin") {
        mostrarError("Esta pantalla es solo para médicos.");
        return;
      }
      const hoy = new Date().toISOString().slice(0, 10);
      document.getElementById("fecha-agenda").value = hoy;
      await cargarAgenda(hoy);
    })();

    document.getElementById("logout").addEventListener("click", () => {
      SGCM.logout();
      window.location.href = "/login.html";
    });

    document.getElementById("fecha-agenda").addEventListener("change", (e) => {
      cargarAgenda(e.target.value);
    });

    document.getElementById("btn-hoy").addEventListener("click", () => {
      const hoy = new Date().toISOString().slice(0, 10);
      document.getElementById("fecha-agenda").value = hoy;
      cargarAgenda(hoy);
    });

    function mostrarError(msg) {
      const box = document.getElementById("agenda-error");
      box.textContent = msg;
      box.classList.remove("hidden");
    }

    async function cargarAgenda(fecha) {
      document.getElementById("agenda-error").classList.add("hidden");
      const d = new Date(fecha + "T12:00:00");
      document.getElementById("titulo-agenda").textContent =
        `Citas del ${d.toLocaleDateString("es-DO", { weekday: "long", year: "numeric", month: "long", day: "numeric" })}`;

      try {
        const data = await SGCM.api(`/consultas/agenda?fecha=${fecha}`);
        const lista = document.getElementById("agenda-lista");
        lista.innerHTML = "";

        if (data.length === 0) {
          lista.innerHTML = `<p class="text-slate-400 text-sm text-center py-6">Sin citas para este día.</p>`;
          return;
        }

        for (const cita of data) {
          const card = document.createElement("div");
          card.className = "flex items-center justify-between bg-slate-50 rounded-xl px-4 py-3 border border-slate-200";

          const estadoBadge = cita.estado === "pendiente"
            ? "bg-blue-100 text-blue-800"
            : cita.estado === "atendida"
            ? "bg-green-100 text-green-800"
            : "bg-gray-100 text-gray-600";

          card.innerHTML = `
            <div class="space-y-1">
              <div class="flex items-center gap-2">
                <span class="font-semibold text-slate-800">${cita.hora.slice(0, 5)}</span>
                <span class="px-2 py-0.5 rounded text-xs font-semibold ${estadoBadge}">${cita.estado}</span>
              </div>
              <div class="text-sm text-slate-600">
                Paciente #${cita.id_paciente}
                ${cita.motivo ? `· <span class="italic">${cita.motivo}</span>` : ""}
              </div>
            </div>
            <div>
              ${cita.estado === "pendiente"
                ? `<button data-id="${cita.id}" data-info="Paciente #${cita.id_paciente} · ${cita.hora.slice(0,5)}"
                    class="atender-btn bg-green-700 hover:bg-green-800 text-white text-sm font-semibold px-3 py-1.5 rounded-lg">
                    Registrar consulta
                  </button>`
                : `<span class="text-xs text-slate-400">Finalizada</span>`
              }
            </div>
          `;
          lista.appendChild(card);
        }

        lista.querySelectorAll(".atender-btn").forEach((b) =>
          b.addEventListener("click", () => abrirModalConsulta(b.dataset.id, b.dataset.info))
        );
      } catch (err) {
        mostrarError(err.message);
      }
    }

    // ══════════════ MODAL REGISTRAR CONSULTA ══════════════
    document.getElementById("rc-cerrar").addEventListener("click", cerrarModalConsulta);
    document.getElementById("rc-cancelar").addEventListener("click", cerrarModalConsulta);

    function abrirModalConsulta(citaId, citaInfo) {
      document.getElementById("rc-cita-id").value = citaId;
      document.getElementById("rc-cita-info").textContent = citaInfo;
      document.getElementById("rc-observaciones").value = "";
      document.getElementById("rc-error").classList.add("hidden");
      document.getElementById("modal-consulta").classList.remove("hidden");
    }

    function cerrarModalConsulta() {
      document.getElementById("modal-consulta").classList.add("hidden");
    }

    document.getElementById("form-consulta").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errBox = document.getElementById("rc-error");
      errBox.classList.add("hidden");
      try {
        await SGCM.api("/consultas", {
          method: "POST",
          body: JSON.stringify({
            id_cita: parseInt(document.getElementById("rc-cita-id").value),
            observaciones: document.getElementById("rc-observaciones").value,
          }),
        });
        cerrarModalConsulta();
        await cargarAgenda(document.getElementById("fecha-agenda").value);
      } catch (err) {
        errBox.textContent = err.message;
        errBox.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
