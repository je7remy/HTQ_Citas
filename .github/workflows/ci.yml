name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Tests + Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sgcm
          POSTGRES_PASSWORD: sgcm
          POSTGRES_DB: sgcm_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b \
            libcairo2 libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx ruff

      - name: Lint (ruff)
        run: ruff check app tests scripts || true

      - name: Run pytest
        env:
          JWT_SECRET_KEY: ci-secret-key-with-at-least-32-characters-for-tests
          POSTGRES_USER: sgcm
          POSTGRES_PASSWORD: sgcm
          POSTGRES_DB: sgcm_db
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
        run: pytest -v

  docker-build:
    name: Verifica que la imagen Docker compila
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t sgcm:ci .
